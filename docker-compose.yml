services:
  # DespesaGo Frontend (React SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Redirection HTTP -> HTTPS
      - "traefik.http.routers.despesago-http.rule=Host(`despesago.com.br`)"
      - "traefik.http.routers.despesago-http.entrypoints=web"
      - "traefik.http.routers.despesago-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectScheme.scheme=https"
      # HTTPS Router
      - "traefik.http.routers.despesago.rule=Host(`despesago.com.br`)"
      - "traefik.http.routers.despesago.entrypoints=websecure"
      - "traefik.http.routers.despesago.tls=true"
      - "traefik.http.routers.despesago.tls.certresolver=le"
      - "traefik.http.services.despesago.loadbalancer.server.port=80"

  # DespesaGo Backend (OCR & Multi-agent API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=${RESEND_FROM}
      - FRONTEND_URL=${FRONTEND_URL}
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Configuração para responder em /api com strip do prefixo
      - "traefik.http.routers.despesago-api.rule=Host(`despesago.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.despesago-api.entrypoints=websecure"
      - "traefik.http.routers.despesago-api.tls=true"
      - "traefik.http.routers.despesago-api.tls.certresolver=le"
      - "traefik.http.routers.despesago-api.middlewares=despesago-api-strip"
      - "traefik.http.middlewares.despesago-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.despesago-api.loadbalancer.server.port=3000"

networks:
  traefik-public:
    external: true
